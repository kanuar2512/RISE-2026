<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISE 2026 — Pembentangan</title>
  <meta name="description" content="Shell pembentangan RISE 2026 — pilih deck melalui ?deck=<id>." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/styles.css" />

  <style>
    /* Gate overlay — VISIBLE BY DEFAULT, hidden via JS after auth */
    #pwOverlay {
      display: flex;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(135deg, #3d0000 0%, #800000 60%, #a52a2a 100%);
      align-items: center;
      justify-content: center;
      pointer-events: all;
    }
    #pwOverlay.pw-gone { display: none !important; }
  </style>
</head>
<body>

  <!-- Gate overlay: shows first, hidden by JS for unlocked decks -->
  <div id="pwOverlay">
    <div class="pw-box">
      <div class="pw-icon">&#128274;</div>
      <h2 class="pw-title">Deck Dikunci</h2>
      <p class="pw-desc">Masukkan kata laluan untuk meneruskan.</p>
      <div class="pw-field">
        <input type="password" id="pwInput" class="pw-input" placeholder="Kata laluan..." autocomplete="off" />
        <button class="pw-btn" id="pwBtn">Masuk</button>
      </div>
      <p class="pw-err" id="pwErr">Kata laluan salah. Cuba lagi.</p>
      <a href="index.html" class="pw-back">&#8592; Kembali ke Hub</a>
    </div>
  </div>

  <!-- Deck shell (behind overlay until gate passes) -->
  <div class="progress" id="progress"></div>
  <main id="deck">
    <div class="stage" id="stage"></div>
  </main>
  <nav class="nav" id="nav" aria-label="Navigasi slaid"></nav>
  <div class="nav-arrows">
    <a href="index.html" id="homeBtn" aria-label="Kembali ke hub">&#8962;</a>
    <button id="prevBtn" aria-label="Slaid sebelum">&#8249;</button>
    <button id="nextBtn" aria-label="Slaid seterusnya">&#8250;</button>
    <button id="fsBtn" aria-label="Skrin penuh">&#9974;</button>
  </div>
  <div class="hint">&#8592; &#8594; / ruang &middot; F skrin penuh</div>

  <!-- Assets & deck registry -->
  <script src="assets/data/logos.js"></script>
  <script src="assets/data/geo-malaysia.js"></script>
  <script src="assets/data/content.js"></script>
  <script src="decks/penjurian-content.js"></script>
  <script src="decks/taklimat-juri-content.js"></script>
  <script src="decks/layout-content.js"></script>
  <script src="decks/research-content.js"></script>
  <script src="decks/digital-content.js"></script>
  <script src="assets/js/components.js"></script>

  <script>
  /* ============================================================
     PASSWORD GATE
     Strategy: overlay is ALWAYS visible on page load.
     JS hides it immediately for unlocked decks,
     or after correct password for locked decks.
     Engine.js is loaded dynamically — only after gate passes.
  ============================================================ */
  (function () {
    var overlay = document.getElementById("pwOverlay");

    function unlock() {
      overlay.classList.add("pw-gone");
      var s = document.createElement("script");
      s.src = "assets/js/engine.js";
      document.body.appendChild(s);
    }

    var wanted = new URLSearchParams(location.search).get("deck");
    var reg    = window.RISE_DECKS || {};
    var deck   = (wanted && reg[wanted]) ? reg[wanted] : null;

    /* Deck has no lock — pass through immediately */
    if (!deck || !deck.locked) {
      unlock();
      return;
    }

    /* Already unlocked this session — pass through */
    var SK = "rise_unlocked_" + wanted;
    if (sessionStorage.getItem(SK) === "1") {
      unlock();
      return;
    }

    /* Deck is locked — wait for correct password */
    setTimeout(function () { document.getElementById("pwInput").focus(); }, 80);

    function attempt() {
      var val   = document.getElementById("pwInput").value;
      var errEl = document.getElementById("pwErr");
      try {
        if (btoa(unescape(encodeURIComponent(val))) === deck.locked) {
          sessionStorage.setItem(SK, "1");
          errEl.style.display = "none";
          unlock();
        } else {
          errEl.style.display = "block";
          document.getElementById("pwInput").value = "";
          document.getElementById("pwInput").focus();
        }
      } catch(e) {
        errEl.style.display = "block";
        document.getElementById("pwInput").value = "";
      }
    }

    document.getElementById("pwBtn").addEventListener("click", attempt);
    document.getElementById("pwInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); attempt(); }
    });
  })();
  </script>
</body>
</html>
